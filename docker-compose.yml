# Dev: ambiente de DESENVOLVIMENTO do ISP Manager.
#
# Cinco serviços:
#   postgres: Postgres 17 + init.sh criando roles e database
#   redis: broker do Celery + cache leve
#   api: FastAPI (uvicorn em modo reload)
#   worker: Celery worker
#   frontend: Next.js dev server

name: isp_manager

services:
  # POSTGRES
  postgres:
    image: postgres:17-bookworm
    container_name: isp_manager_postgres
    restart: unless-stopped

    # POSTGRES_USER/POSTGRES_PASSWORD aqui são as credenciais do SUPERUSUÁRIO,
    # usado pelo init.sh para criar os roles da aplicação (isp_app e isp_migrator).
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-isp_manager}
      # Variáveis customizadas usadas pelo init.sh
      ISP_APP_DB_USER: ${ISP_APP_DB_USER:-isp_app}
      ISP_APP_DB_PASSWORD: ${ISP_APP_DB_PASSWORD}
      ISP_MIGRATOR_DB_USER: ${ISP_MIGRATOR_DB_USER:-isp_migrator}
      ISP_MIGRATOR_DB_PASSWORD: ${ISP_MIGRATOR_DB_PASSWORD}
      TZ: UTC
      PGTZ: UTC

    ports:
      - "5432:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ISP_MIGRATOR_DB_USER:-isp_migrator} -d ${POSTGRES_DB:-isp_manager}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

    networks:
      - isp_net

  # REDIS
  redis:
    image: redis:7-bookworm
    container_name: isp_manager_redis
    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --maxmemory-policy noeviction

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    networks:
      - isp_net

  # API (FastAPI)
  api:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: dev
    image: isp_manager_backend:dev
    container_name: isp_manager_api
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Sobrescreve hosts para nomes da rede interna do compose.
      # Garante que mesmo se .env tiver localhost, dentro do container resolve certo.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app

    # `exec` na segunda linha substitui o processo bash pelo uvicorn,
    # mantendo tini -> uvicorn (PID 1 propaga sinais corretamente).
    command:
      - "bash"
      - "-c"
      - |
        python /app/scripts/render_uvicorn_log_config.py > /tmp/uvicorn_log.json && \
        exec uvicorn app.main:app \
          --host 0.0.0.0 \
          --port 8000 \
          --reload \
          --reload-dir /app/app \
          --log-config /tmp/uvicorn_log.json

    ports:
      - "8000:8000"

    volumes:
      # Bind mount do código backend (hot reload).
      - ./backend:/app
      # Volume backend_venv REMOVIDO no Marco 3: deps agora vivem na imagem.

    # Healthcheck real do endpoint de liveness.
    # start_period generoso porque o pip install na primeira subida pode ser lento.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - isp_net

  # WORKER (Celery)
  worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: dev
    image: isp_manager_backend:dev
    container_name: isp_manager_worker
    restart: unless-stopped

    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app
    volumes:
      - ./backend:/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Garante que a build da imagem aconteceu primeiro (api compartilha image).
      api:
        condition: service_started
    # Worker não precisa de --log-config: setup_logging do Celery já chama
    # configure_logging() no boot do worker (signal em app.core.celery_signals).
    command: celery -A app.worker:celery_app worker --loglevel=INFO
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.worker:celery_app inspect ping -t 10 | grep -q pong",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - isp_net

  # FRONTEND (Next.js)
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile.dev
    image: isp_manager_frontend:dev
    container_name: isp_manager_frontend
    restart: unless-stopped

    environment:
      # URL PÚBLICA: o NAVEGADOR usa esta (chamada cross-origin -> passa por CORS).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # URL INTERNA: SSR / route handlers DENTRO do container falam com a API por aqui
      # (resolve "api" pela rede do compose; NÃO passa por CORS).
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      NODE_ENV: development
      # Polling do watcher: necessário para hot reload em bind mount em alguns hosts.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    # Sem "command:" aqui de propósito: vale o CMD do Dockerfile (npm run dev).
    # IMPORTANTE: NÃO usamos env_file: .env neste serviço. O frontend não deve
    # receber senhas do Postgres nem a API_SECRET_KEY; passamos só as URLs acima.

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

    # Liveness do próprio frontend via route handler leve (/api/health),
    # que não depende de compilar a página inteira no primeiro acesso.
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    depends_on:
      api:
        condition: service_started

    networks:
      - isp_net

# REDE
networks:
  isp_net:
    name: isp_manager_net
    driver: bridge

# VOLUMES NOMEADOS
volumes:
  pg_data:
    name: isp_manager_pg_data
  redis_data:
    name: isp_manager_redis_data
  frontend_node_modules:
    name: isp_manager_frontend_node_modules
  frontend_next_cache:
    name: isp_manager_frontend_next_cache
