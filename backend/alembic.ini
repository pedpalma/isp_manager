# Configuração do Alembic para o isp_manager.
# O comando `alembic` roda com o diretório de trabalho no diretório que contém este arquivo (no container = /app; no host = backend/).

[alembic]
# Onde ficam env.py, script.py.mako e versions.
script_location = alembic

# Prepende o diretório atual ao sys.path para que `import app...` funcione.
prepend_sys_path = .

sqlalchemy.url =

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S